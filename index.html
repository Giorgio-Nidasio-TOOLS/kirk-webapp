<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Comandante Kirk a Enterprise</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <header>
    <span id="app-name">Comandante Kirk</span>
    <span id="session-info">—</span>
    <div class="header-btns">
      <button id="notif-btn" title="Abilita notifiche push" style="display:none">🔔</button>
      <button id="mute-btn" title="Mute TTS">🔊</button>
      <button id="new-session-btn" title="Nuova sessione">↺</button>
      <button id="settings-btn" title="Impostazioni">⚙️</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="status" class="warning">Configura URL e token in ⚙️</div>

  <div id="settings-panel" class="panel hidden">
    <h3>Impostazioni Kirk</h3>
    <label>URL Server (tunnel ngrok)
      <input id="server-url" type="url" placeholder="https://kirk-enterprise.cfargotunnel.com">
    </label>
    <label>Token Segreto
      <input id="api-token" type="password" placeholder="token generato da setup.ps1">
    </label>
    <button id="save-settings">Salva e connetti</button>
  </div>

  <div id="note-panel" class="panel hidden">
    <h3>📝 Nuova Nota Vocale</h3>
    <textarea id="note-text" placeholder="Scrivi la nota oppure usa il microfono..." rows="3"></textarea>
    <div class="note-actions">
      <button id="note-mic-btn">🎤 Registra</button>
      <button id="note-send-btn" class="note-save">Salva Nota</button>
    </div>
    <div id="note-status"></div>
  </div>

  <footer>
    <textarea id="text-input" placeholder="Scrivi un comando..." rows="1"></textarea>
    <button id="note-btn" title="Nota vocale">📝</button>
    <button id="mic-btn" title="Registra voce">🎤</button>
    <button id="send-btn" title="Invia">▶</button>
  </footer>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
